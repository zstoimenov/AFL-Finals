name: Update AFL data

on:
  schedule:
    # daily at 21:00 AWST (13:00 UTC; AWST has no daylight saving) — picks up
    # results and ladder moves through the season and finals
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch Squiggle snapshot
        run: node scripts/fetch-data.mjs
      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh AFL data snapshot"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi
      # Pushes made with GITHUB_TOKEN never fire on:push workflows (GitHub's
      # recursion guard), so the Pages deploy must be chained explicitly.
      # Only deploy from the default branch — a data refresh run on a feature
      # branch (e.g. to preview real data) must not publish it to production.
      - name: Trigger site deploy
        if: steps.commit.outputs.pushed == 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY"
